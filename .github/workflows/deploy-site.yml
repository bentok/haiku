name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'cloud/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.HAIKU_SITE_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Look up stack outputs
        id: stack
        run: |
          bucket=$(aws cloudformation describe-stacks \
            --stack-name HaikuStack \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          distribution_id=$(aws cloudformation describe-stacks \
            --stack-name HaikuStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          domain=$(aws cloudformation describe-stacks \
            --stack-name HaikuStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue" \
            --output text)
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$distribution_id" >> "$GITHUB_OUTPUT"
          echo "domain=$domain" >> "$GITHUB_OUTPUT"
          echo "Site is served from https://$domain"

      - name: Sync to S3
        run: |
          aws s3 sync dist/ "s3://${{ steps.stack.outputs.bucket }}" \
            --delete --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" --exclude "*.xml" --exclude "*.txt"
          aws s3 sync dist/ "s3://${{ steps.stack.outputs.bucket }}" \
            --delete --cache-control "no-cache" \
            --exclude "*" --include "*.html" --include "*.xml" --include "*.txt"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.distribution_id }}" \
            --paths "/*"
